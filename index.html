<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TN // OS_v.01</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root {
            --neon: #00f2ff;
            --glitch-red: #ff0055;
        }

        body {
            background: #000;
            color: #fff;
            margin: 0;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
        }

        /* Interactive Grid Background */
        #bg-grid {
            position: fixed;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image: 
                linear-gradient(var(--neon) 1px, transparent 1px),
                linear-gradient(90deg, var(--neon) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            transform: perspective(500px) rotateX(60deg);
            animation: moveGrid 20s linear infinite;
            z-index: 1;
        }

        @keyframes moveGrid {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }

        /* Navigation - Cyber Style */
        nav {
            position: fixed;
            top: 20px; width: 90%; left: 5%;
            display: flex; justify-content: space-between;
            z-index: 100;
            border: 1px solid rgba(0, 242, 255, 0.3);
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            backdrop-filter: blur(5px);
        }

        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        nav a { color: var(--neon); text-decoration: none; font-size: 12px; letter-spacing: 2px; }
        nav a:hover { text-shadow: 0 0 10px var(--neon); }

        /* Main Glitch Hero */
        .hero {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .glitch-title {
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            color: #fff;
        }

        /* Fun Glitch Effect */
        .glitch-title::before, .glitch-title::after {
            content: "TOM NGUYEN";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
        }

        .glitch-title::before {
            left: 2px;
            text-shadow: -2px 0 var(--glitch-red);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch-title::after {
            left: -2px;
            text-shadow: -2px 0 var(--neon);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            20% { clip: rect(62px, 9999px, 42px, 0); }
            /* ... more frames ... */
            100% { clip: rect(89px, 9999px, 98px, 0); }
        }

        /* Floating Interactive Box */
        .status-box {
            border: 1px solid var(--neon);
            padding: 20px;
            margin-top: 30px;
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            font-size: 0.8rem;
            color: var(--neon);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .enter-btn {
            margin-top: 40px;
            padding: 15px 40px;
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: 0.3s;
        }

        .enter-btn:hover {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 30px var(--neon);
        }

    </style>
</head>
<body>

    <div id="bg-grid"></div>

    <nav>
        <div class="nav-id">TN // SYSTEM_CORE</div>
        <ul>
            <li><a href="index.html">01_HOME</a></li>
            <li><a href="photo.html">02_PHOTO</a></li>
            <li><a href="design.html">03_DESIGN</a></li>
        </ul>
    </nav>

    <main class="hero">
        <div class="glitch-title" data-text="TOM NGUYEN">TOM NGUYEN</div>
        
        <div class="status-box">
            [ STATUS: AUTHORIZED ]<br>
            [ LOCATION: GARDEN GROVE, CA ]<br>
            [ YEAR: 2026 ]
        </div>

        <button class="enter-btn" onclick="location.href='photo.html'">INITIALIZE</button>
    </main>

</body>
</html>
